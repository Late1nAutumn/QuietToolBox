<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGL圆柱体 - 完整兼容版</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <canvas id="webglCanvas" width="800" height="600"></canvas>
  <div class="info">
    使用WASD移动相机 | Q/E升降 | 圆柱体自动旋转
  </div>

  <script>
    // 相机控制变量
    const canvas = document.getElementById('webglCanvas');
    let cameraPosition = [0, 0, 5];    // 相机位置
    let cameraTarget = [0, 0, 0];      // 观察目标
    let cameraUp = [0, 1, 0];          // 上方向

    // 数学工具函数
    function subtractVectors(a, b) {
      return [a[0] - b[0], a[1] - b[1], a[2] - b[2]];
    }

    function normalize(v) {
      const length = Math.sqrt(v[0] * v[0] + v[1] * v[1] + v[2] * v[2]);
      if (length > 0.00001) {
        return [v[0] / length, v[1] / length, v[2] / length];
      }
      return [0, 0, 0];
    }

    function crossProduct(a, b) {
      return [
        a[1] * b[2] - a[2] * b[1],
        a[2] * b[0] - a[0] * b[2],
        a[0] * b[1] - a[1] * b[0]
      ];
    }

    function dotProduct(a, b) {
      return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
    }

    // 创建视图矩阵（列主序）
    function createViewMatrix(eye, target, up) {
      const z = normalize(subtractVectors(eye, target));
      const x = normalize(crossProduct(up, z));
      const y = normalize(crossProduct(z, x));

      return [
        x[0], x[1], x[2], 0,
        y[0], y[1], y[2], 0,
        z[0], z[1], z[2], 0,
        -dotProduct(x, eye), -dotProduct(y, eye), -dotProduct(z, eye), 1
      ];
    }

    // 4x4矩阵乘法（列主序）
    function multiplyMatrices(a, b) {
      const result = new Array(16);
      for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 4; j++) {
          result[j * 4 + i] = 0;
          for (let k = 0; k < 4; k++) {
            result[j * 4 + i] += a[k * 4 + i] * b[j * 4 + k];
          }
        }
      }
      return result;
    }

    // 创建透视投影矩阵（列主序）
    function createProjectionMatrix(aspect) {
      const fov = 45 * Math.PI / 180;
      const near = 0.1;
      const far = 100.0;

      const f = 1.0 / Math.tan(fov / 2);
      const rangeInv = 1.0 / (near - far);

      return [
        f / aspect, 0, 0, 0,
        0, f, 0, 0,
        0, 0, (far + near) * rangeInv, -1,
        0, 0, 2 * far * near * rangeInv, 0
      ];
    }

    // 创建模型矩阵（列主序）
    function createModelMatrix(time) {
      const rotation = time * 0.001;
      const cosR = Math.cos(rotation);
      const sinR = Math.sin(rotation);

      return [
        cosR, 0, -sinR, 0,
        0, 1, 0, 0,
        sinR, 0, cosR, 0,
        0, 0, 0, 1
      ];
    }

    // 创建法线矩阵（模型视图矩阵的逆转置）
    function createNormalMatrix(modelViewMatrix) {
      const m00 = modelViewMatrix[0], m01 = modelViewMatrix[1], m02 = modelViewMatrix[2];
      const m10 = modelViewMatrix[4], m11 = modelViewMatrix[5], m12 = modelViewMatrix[6];
      const m20 = modelViewMatrix[8], m21 = modelViewMatrix[9], m22 = modelViewMatrix[10];

      const determinant =
        m00 * (m11 * m22 - m12 * m21) -
        m01 * (m10 * m22 - m12 * m20) +
        m02 * (m10 * m21 - m11 * m20);

      const invDet = 1.0 / determinant;

      return [
        (m11 * m22 - m12 * m21) * invDet,
        (m12 * m20 - m10 * m22) * invDet,
        (m10 * m21 - m11 * m20) * invDet,
        (m02 * m21 - m01 * m22) * invDet,
        (m00 * m22 - m02 * m20) * invDet,
        (m01 * m20 - m00 * m21) * invDet,
        (m01 * m12 - m02 * m11) * invDet,
        (m02 * m10 - m00 * m12) * invDet,
        (m00 * m11 - m01 * m10) * invDet
      ];
    }

    function main() {
      const gl = initWebGL(canvas);

      if (!gl) {
        alert('无法初始化WebGL');
        return;
      }

      const cylinderData = createCylinderData(1.0, 2.0, 32, 0.5);
      const textureCanvas = generateSideSurfaceTexture();
      const texture = createTexture(gl, textureCanvas);
      const program = setupShaders(gl);
      const buffers = setupBuffers(gl, cylinderData);

      gl.enable(gl.DEPTH_TEST);
      gl.clearColor(0.1, 0.1, 0.2, 1.0);

      setupCameraControls();
      render(gl, program, buffers, cylinderData, texture);
    }

    function initWebGL(canvas) {
      const contexts = ['webgl', 'experimental-webgl'];
      let gl = null;

      for (let context of contexts) {
        gl = canvas.getContext(context);
        if (gl) break;
      }
      return gl;
    }

    function createCylinderData(radius, height, segments, sideRadiusProportion = 1) {
      const positions = [];
      const normals = [];
      const uvs = [];
      const indices = [];

      const halfHeight = height / 2;
      const sideRaius = radius * sideRadiusProportion

      // generate vertices for cylinder side surfaces
      for (let i = 0; i <= segments; i++) {
        const theta = (i / segments) * Math.PI * 2;
        const x = Math.cos(theta);
        const z = Math.sin(theta);
        const u = i / segments;

        // top vertices
        positions.push(sideRaius * x, halfHeight, sideRaius * z);
        normals.push(x, 0, z);
        uvs.push(u, 1.0);

        // bottom vertices
        positions.push(sideRaius * x, -halfHeight, sideRaius * z);
        normals.push(x, 0, z);
        uvs.push(u, 0.0);
      }

      // indices of side surfaces
      for (let i = 0; i < segments; i++) {
        const topLeft = 2 * i;
        const topRight = 2 * (i + 1);
        const bottomLeft = 2 * i + 1;
        const bottomRight = 2 * (i + 1) + 1;

        indices.push(topLeft, bottomLeft, topRight);
        indices.push(topRight, bottomLeft, bottomRight);
      }

      // top surface
      const topCenterIndex = positions.length / 3;
      positions.push(0, halfHeight, 0);
      normals.push(0, 1, 0);

      for (let i = 0; i <= segments; i++) {
        const theta = (i / segments) * Math.PI * 2;
        positions.push(radius * Math.cos(theta), halfHeight, radius * Math.sin(theta));
        normals.push(0, 1, 0);
      }

      for (let i = 0; i < segments; i++) {
        indices.push(topCenterIndex, topCenterIndex + i + 1, topCenterIndex + i + 2);
      }

      // bottom surface
      const bottomCenterIndex = positions.length / 3;
      positions.push(0, -halfHeight, 0);
      normals.push(0, -1, 0);

      for (let i = 0; i <= segments; i++) {
        const theta = (i / segments) * Math.PI * 2;
        positions.push(radius * Math.cos(theta), -halfHeight, radius * Math.sin(theta));
        normals.push(0, -1, 0);
      }

      for (let i = 0; i < segments; i++) {
        indices.push(bottomCenterIndex, bottomCenterIndex + i + 2, bottomCenterIndex + i + 1);
      }

      return {
        positions: new Float32Array(positions),
        normals: new Float32Array(normals),
        uvs: new Float32Array(uvs),
        indices: new Uint16Array(indices),
        vertexCount: indices.length
      };
    }

    function generateSideSurfaceTexture() {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 256;
      canvas.height = 256;

      // 绘制条纹纹理
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(0, 0, 256, 256);

      ctx.fillStyle = '#ffffff';
      for (let i = 0; i < 256; i += 32) {
        ctx.fillRect(i, 0, 16, 256);
      }

      return canvas;
    }
    function generateDiscSurfaceTexture() { }
    function createTexture(gl, image) {
      const texture = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, texture);

      // 设置纹理参数（重要！）
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

      // 上传纹理数据
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, image);

      // 可选：生成mipmap（用于更好的缩小效果）
      gl.generateMipmap(gl.TEXTURE_2D);

      return texture;
    }

    function setupShaders(gl) {
      const vsSource = `
                attribute vec3 aPosition;
                attribute vec3 aNormal;
                attribute vec2 aUV;
                uniform mat4 uModelViewMatrix;
                uniform mat4 uProjectionMatrix;
                uniform mat3 uNormalMatrix;
                varying vec3 vNormal;
                varying vec2 vUV;
                void main() {
                  vNormal = uNormalMatrix * aNormal;
                  gl_Position = uProjectionMatrix * uModelViewMatrix * vec4(aPosition, 1.0);
                  vUV = aUV;
                }
            `;

      const fsSource = `
                precision mediump float;
                varying vec3 vNormal;
                varying vec2 vUV;
                uniform sampler2D uTexture;
                void main() {
                  vec4 textureColor = texture2D(uTexture, vUV);
                  gl_FragColor = textureColor;
                }
            `;
      // vec3 normal = normalize(vNormal);
      // float lighting = 0.4 + 0.6 * max(dot(normal, vec3(0.3, 1.0, 0.3)), 0.0);
      // vec3 color = vec3(0.4, 0.6, 0.8) * lighting;
      // gl_FragColor = vec4(color, 1.0);

      const vertexShader = createShader(gl, gl.VERTEX_SHADER, vsSource);
      const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fsSource);
      return createProgram(gl, vertexShader, fragmentShader);
    }

    function createShader(gl, type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error('着色器错误:', gl.getShaderInfoLog(shader));
        return null;
      }
      return shader;
    }

    function createProgram(gl, vertexShader, fragmentShader) {
      const program = gl.createProgram();
      gl.attachShader(program, vertexShader);
      gl.attachShader(program, fragmentShader);
      gl.linkProgram(program);
      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error('程序链接错误:', gl.getProgramInfoLog(program));
        return null;
      }
      return program;
    }

    function setupBuffers(gl, cylinderData) {
      const buffers = {};

      buffers.position = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buffers.position);
      gl.bufferData(gl.ARRAY_BUFFER, cylinderData.positions, gl.STATIC_DRAW);

      buffers.normal = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buffers.normal);
      gl.bufferData(gl.ARRAY_BUFFER, cylinderData.normals, gl.STATIC_DRAW);

      buffers.uv = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buffers.uv);
      gl.bufferData(gl.ARRAY_BUFFER, cylinderData.uvs, gl.STATIC_DRAW);

      buffers.indices = gl.createBuffer();
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, buffers.indices);
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, cylinderData.indices, gl.STATIC_DRAW);

      return buffers;
    }

    function setupCameraControls() {
      // 相机朝向（初始看向 -Z 方向）
      let cameraFront = [0, 0, -1];

      document.addEventListener('keydown', (event) => {
        const moveSpeed = 0.1;
        const key = event.key.toLowerCase();

        // 计算相机右方向（前方向与世界上方向的叉积）
        const cameraRight = normalize(crossProduct(cameraFront, [0, 1, 0]));

        switch (key) {
          case 'w':
            // 向前：沿着相机前方向
            cameraPosition[0] += cameraFront[0] * moveSpeed;
            cameraPosition[1] += cameraFront[1] * moveSpeed;
            cameraPosition[2] += cameraFront[2] * moveSpeed;
            break;
          case 's':
            // 向后：沿着相机前方向的反方向
            cameraPosition[0] -= cameraFront[0] * moveSpeed;
            cameraPosition[1] -= cameraFront[1] * moveSpeed;
            cameraPosition[2] -= cameraFront[2] * moveSpeed;
            break;
          case 'a':
            // 向左：沿着相机右方向的反方向
            cameraPosition[0] -= cameraRight[0] * moveSpeed;
            cameraPosition[1] -= cameraRight[1] * moveSpeed;
            cameraPosition[2] -= cameraRight[2] * moveSpeed;
            break;
          case 'd':
            // 向右：沿着相机右方向
            cameraPosition[0] += cameraRight[0] * moveSpeed;
            cameraPosition[1] += cameraRight[1] * moveSpeed;
            cameraPosition[2] += cameraRight[2] * moveSpeed;
            break;
          case 'q':
            // 向上：世界Y轴
            cameraPosition[1] += moveSpeed;
            break;
          case 'e':
            // 向下：世界Y轴
            cameraPosition[1] -= moveSpeed;
            break;
        }

        // 关键：更新观察目标（相机位置 + 前方向）
        cameraTarget = [
          cameraPosition[0] + cameraFront[0],
          cameraPosition[1] + cameraFront[1],
          cameraPosition[2] + cameraFront[2]
        ];
      });

      // 鼠标控制朝向
      let yaw = -90;   // 初始朝向 -Z 方向
      let pitch = 0;

      document.addEventListener('mousemove', (event) => {
        const sensitivity = 0.1;

        // 更新角度（简化版，实际需要记录上次鼠标位置）
        // yaw += event.movementX * sensitivity;
        pitch -= event.movementY * sensitivity;

        // 限制俯仰角
        if (pitch > 89.0) pitch = 89.0;
        if (pitch < -89.0) pitch = -89.0;

        // 计算新的前方向
        cameraFront = [
          Math.cos(yaw * Math.PI / 180) * Math.cos(pitch * Math.PI / 180),
          Math.sin(pitch * Math.PI / 180),
          Math.sin(yaw * Math.PI / 180) * Math.cos(pitch * Math.PI / 180)
        ];
        cameraFront = normalize(cameraFront);

        // 更新观察目标
        cameraTarget = [
          cameraPosition[0] + cameraFront[0],
          cameraPosition[1] + cameraFront[1],
          cameraPosition[2] + cameraFront[2]
        ];
      });

      // 启用指针锁定
      canvas.addEventListener('click', () => {
        canvas.requestPointerLock();
      });
    }

    function render(gl, program, buffers, cylinderData, texture) {
      gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
      gl.useProgram(program);

      // 设置顶点属性
      const positionLocation = gl.getAttribLocation(program, 'aPosition');
      const normalLocation = gl.getAttribLocation(program, 'aNormal');

      gl.bindBuffer(gl.ARRAY_BUFFER, buffers.position);
      gl.vertexAttribPointer(positionLocation, 3, gl.FLOAT, false, 0, 0);
      gl.enableVertexAttribArray(positionLocation);

      gl.bindBuffer(gl.ARRAY_BUFFER, buffers.normal);
      gl.vertexAttribPointer(normalLocation, 3, gl.FLOAT, false, 0, 0);
      gl.enableVertexAttribArray(normalLocation);

      // 设置UV属性
      const uvLocation = gl.getAttribLocation(program, 'aUV');
      gl.bindBuffer(gl.ARRAY_BUFFER, buffers.uv);
      gl.vertexAttribPointer(uvLocation, 2, gl.FLOAT, false, 0, 0);
      gl.enableVertexAttribArray(uvLocation);

      // 激活纹理
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, texture);
      const textureLocation = gl.getUniformLocation(program, 'uTexture');
      gl.uniform1i(textureLocation, 0);

      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, buffers.indices);

      // 获取uniform位置
      const modelViewLocation = gl.getUniformLocation(program, 'uModelViewMatrix');
      const projectionLocation = gl.getUniformLocation(program, 'uProjectionMatrix');
      const normalMatrixLocation = gl.getUniformLocation(program, 'uNormalMatrix');

      // 计算矩阵
      const aspect = gl.canvas.width / gl.canvas.height;
      const projectionMatrix = createProjectionMatrix(aspect);
      const modelMatrix = createModelMatrix(performance.now());
      const viewMatrix = createViewMatrix(cameraPosition, cameraTarget, cameraUp);
      const modelViewMatrix = multiplyMatrices(viewMatrix, modelMatrix);
      const normalMatrix = createNormalMatrix(modelViewMatrix);

      // 传递uniform
      gl.uniformMatrix4fv(projectionLocation, false, projectionMatrix);
      gl.uniformMatrix4fv(modelViewLocation, false, modelViewMatrix);
      gl.uniformMatrix3fv(normalMatrixLocation, false, normalMatrix);

      // 绘制
      gl.drawElements(gl.TRIANGLES, cylinderData.vertexCount, gl.UNSIGNED_SHORT, 0);

      requestAnimationFrame(() => render(gl, program, buffers, cylinderData, texture));
    }

    // 启动程序
    main();
  </script>
</body>

</html>
